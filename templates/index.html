<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGG-16 NeuroDiagnostics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header class="navbar">
        <div class="navbar-brand">
            <div class="navbar-icon"><i class="fa-solid fa-brain"></i></div>
            <div class="navbar-title">
                <h1>VGG-16 NeuroDiagnostics</h1>
                <p>Platform Analisis Citra MRI Otak Terintegrasi AI</p>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        
        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-hospital-user"></i> Data Pasien & Citra
            </div>
            
            <div class="input-row">
                <div class="form-group">
                    <label>ID Rekam Medis (Opsional)</label>
                    <input type="text" id="patientId" placeholder="Contoh: RM-2026-001">
                </div>
                <div class="form-group">
                    <label>Nama Pasien</label>
                    <input type="text" id="patientName" placeholder="Masukkan nama lengkap">
                </div>
            </div>
            <div class="form-group">
                <label>Usia Pasien</label>
                <input type="number" id="patientAge" placeholder="Tahun">
            </div>

            <div class="card-header" style="margin-top: 1.5rem;">
                <i class="fa-solid fa-file-waveform"></i> Unggah Pindaian MRI
            </div>

            <div class="image-upload-wrapper">
                <input type="file" id="file" accept="image/*">
            </div>

            <div class="image-preview-container">
                <img id="image-preview" src="" alt="Preview MRI akan muncul di sini" style="display:none;">
            </div>

            <div class="slider-group">
                <div class="slider-container">
                    <label><i class="fa-solid fa-sun"></i> Kecerahan (Brightness)</label>
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </div>
                <div class="slider-container">
                    <label><i class="fa-solid fa-circle-half-stroke"></i> Kontras (Contrast)</label>
                    <input type="range" id="contrast" min="0" max="200" value="100">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-microscope"></i> Hasil Diagnostik AI
            </div>

            <div class="result-box">
                <p class="result-label">Deteksi Utama:</p>
                <h2 id="prediction-result" class="result-value">Belum Dianalisis</h2>
                
                <div class="progress-text">
                    <span>Probabilitas Prediksi Model</span>
                    <span id="confidence-text">0%</span>
                </div>
                <div class="progress-container">
                    <div id="confidence-bar" class="progress-bar"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Catatan Klinis Tambahan</label>
                <textarea id="notes" placeholder="Tambahkan observasi radiologi atau catatan medis pasien di sini..."></textarea>
            </div>

            <button class="btn-primary" id="predict-btn">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Analisis Citra MRI
            </button>
            
            <div class="btn-group">
                <button class="btn-outline" id="reset-btn"><i class="fa-solid fa-rotate-right"></i> Reset Data</button>
                <button class="btn-outline" id="export-pdf-btn"><i class="fa-solid fa-file-pdf"></i> Unduh Laporan PDF</button>
            </div>
        </div>

    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const fileInput = document.getElementById("file");
            const imagePreview = document.getElementById("image-preview");
            const predictBtn = document.getElementById("predict-btn");
            const predictionResult = document.getElementById("prediction-result");
            const confidenceBar = document.getElementById("confidence-bar");
            const confidenceText = document.getElementById("confidence-text");
            const brightnessSlider = document.getElementById("brightness");
            const contrastSlider = document.getElementById("contrast");
            const resetBtn = document.getElementById("reset-btn");
            const exportPdfBtn = document.getElementById("export-pdf-btn");

            // 1. Menampilkan Preview Gambar saat Diunggah
            fileInput.addEventListener("change", function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imagePreview.src = e.target.result;
                        imagePreview.style.display = "block";
                    }
                    reader.readAsDataURL(file);
                }
            });

            // 2. Mengatur Kecerahan dan Kontras Gambar
            function updateFilter() {
                const brightness = brightnessSlider.value;
                const contrast = contrastSlider.value;
                imagePreview.style.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
            }
            brightnessSlider.addEventListener("input", updateFilter);
            contrastSlider.addEventListener("input", updateFilter);

            // 3. Tombol Analisis (Kirim ke Flask AI)
            predictBtn.addEventListener("click", function() {
                const file = fileInput.files[0];
                if (!file) {
                    alert("Silakan unggah pindaian MRI terlebih dahulu.");
                    return;
                }

                // Animasi Loading
                predictionResult.textContent = "Sedang Menganalisis...";
                predictionResult.className = "result-value";
                confidenceText.textContent = "Menunggu hasil...";
                confidenceBar.style.width = "10%";

                const formData = new FormData();
                formData.append("file", file);

                fetch("/predict", {
                    method: "POST",
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        predictionResult.textContent = "Gagal Dianalisis";
                        predictionResult.className = "result-value error";
                        alert(data.error);
                        confidenceBar.style.width = "0%";
                    } else {
                        // Tampilkan Hasil
                        predictionResult.textContent = data.prediction;
                        confidenceText.textContent = data.confidence;
                        confidenceBar.style.width = data.confidence;
                        
                        // Ubah warna teks berdasarkan hasil
                        if (data.prediction.toLowerCase().includes("tidak ada") || data.prediction.toLowerCase().includes("normal")) {
                            predictionResult.className = "result-value normal";
                        } else {
                            predictionResult.className = "result-value tumor";
                        }
                    }
                })
                .catch(error => {
                    predictionResult.textContent = "Gagal Terhubung";
                    predictionResult.className = "result-value error";
                    alert("Terjadi kesalahan jaringan atau server belum siap. " + error);
                });
            });

            // 4. Ekspor PDF Laporan
            exportPdfBtn.addEventListener("click", function() {
                const file = fileInput.files[0];
                if (!file) {
                    alert("Silakan unggah pindaian MRI terlebih dahulu sebelum mengunduh PDF.");
                    return;
                }

                const formData = new FormData();
                formData.append("file", file);
                formData.append("patientId", document.getElementById("patientId").value);
                formData.append("patientName", document.getElementById("patientName").value);
                formData.append("patientAge", document.getElementById("patientAge").value);
                formData.append("prediction", predictionResult.textContent);
                formData.append("confidence", confidenceText.textContent);
                formData.append("notes", document.getElementById("notes").value);

                fetch("/export_pdf", {
                    method: "POST",
                    body: formData
                })
                .then(response => {
                    if (!response.ok) throw new Error("Gagal membuat PDF");
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.style.display = "none";
                    a.href = url;
                    a.download = "Laporan_Diagnostik_MRI.pdf";
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                })
                .catch(error => alert("Error saat mengekspor PDF: " + error));
            });

            // 5. Tombol Reset Form
            resetBtn.addEventListener("click", function() {
                document.getElementById("patientId").value = "";
                document.getElementById("patientName").value = "";
                document.getElementById("patientAge").value = "";
                document.getElementById("notes").value = "";
                fileInput.value = "";
                
                imagePreview.src = "";
                imagePreview.style.display = "none";
                imagePreview.style.filter = "brightness(100%) contrast(100%)";
                
                brightnessSlider.value = 100;
                contrastSlider.value = 100;
                
                predictionResult.textContent = "Belum Dianalisis";
                predictionResult.className = "result-value";
                confidenceText.textContent = "0%";
                confidenceBar.style.width = "0%";
            });
        });
    </script>
</body>
</html>
