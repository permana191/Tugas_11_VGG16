<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Radiologi | Clinical Clean</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-icon">
                <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            </div>
            <div>
                <h2>VGG-16 NeuroDiagnostics</h2>
                <p>Platform Analisis Citra MRI Otak Terintegrasi AI</p>
            </div>
        </div>

        <!-- Kolom Kiri: Input & Image Processing -->
        <div class="panel">
            <h4>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                Data Pasien & Citra
            </h4>
            
            <div style="display: flex; gap: 15px;">
                <input type="text" class="form-control-custom" id="patientId" placeholder="ID Rekam Medis (Ops. )">
                <input type="text" class="form-control-custom" id="patientName" placeholder="Nama Pasien">
            </div>
            <input type="number" class="form-control-custom" id="patientAge" placeholder="Usia">

            <h4 style="margin-top: 20px;">Unggah Pindaian MRI</h4>
            <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div id="uploadText">
                    <svg width="40" height="40" fill="none" stroke="#0ea5e9" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <p style="margin-top: 10px; color: #475569;">Klik untuk memilih file citra MRI (.jpg, .png)</p>
                </div>
                <input type="file" id="fileInput" hidden accept="image/*">
                <img id="preview" src="#" alt="Preview MRI">
            </div>

            <!-- Image Adjustment Tools -->
            <div class="image-controls" id="imageControls" style="display: none;">
                <div class="control-group">
                    <label>Kecerahan (Brightness)</label>
                    <input type="range" class="range-slider" id="brightness" min="50" max="150" value="100">
                </div>
                <div class="control-group">
                    <label>Kontras (Contrast)</label>
                    <input type="range" class="range-slider" id="contrast" min="50" max="150" value="100">
                </div>
            </div>
        </div>

        <!-- Kolom Kanan: Hasil & Laporan -->
        <div class="panel" style="display: flex; flex-direction: column;">
            <h4>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Hasil Diagnostik AI
            </h4>
            
            <div id="statusContainer" style="flex: 1; display: flex; align-items: center; justify-content: center; color: #64748b;">
                <p id="statusText">Menunggu data citra untuk diproses...</p>
            </div>

            <!-- Hasil Analisis -->
            <div id="resultContainer" style="display: none; flex: 1;">
                <div class="result-box">
                    <span style="font-size: 0.85rem; color: #64748b;">Deteksi Utama:</span>
                    <h3 id="predictionText" class="diagnosis-alert"></h3>
                    
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; color: #475569; margin-bottom: 5px;">
                        <span>Probabilitas Prediksi Model</span>
                        <span id="confidencePercentage" style="font-weight: bold;">0%</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-fill" id="confBar"></div>
                    </div>
                </div>

                <!-- Catatan Dokter -->
                <textarea id="clinicalNotes" class="form-control-custom" rows="3" placeholder="Tambahkan catatan klinis atau observasi radiologi di sini..." style="resize: none; background: #ffffff;"></textarea>
            </div>

            <!-- Tombol Aksi -->
            <div>
                <button class="btn-primary" id="btnAnalyze" onclick="processAnalysis()">Analisis Citra MRI</button>
                <div style="display: flex; gap: 15px;">
                    <button class="btn-secondary" id="btnReset" onclick="resetForm()">Reset Data</button>
                    <!-- Tombol Download PDF memanggil fungsi downloadPDF() -->
                    <button class="btn-secondary" id="btnPrint" style="display: none;" onclick="downloadPDF()">Unduh Laporan PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const previewImg = document.getElementById('preview');
        const brightSlider = document.getElementById('brightness');
        const contrastSlider = document.getElementById('contrast');

        function applyImageFilters() {
            previewImg.style.filter = `brightness(${brightSlider.value}%) contrast(${contrastSlider.value}%)`;
        }

        brightSlider.addEventListener('input', applyImageFilters);
        contrastSlider.addEventListener('input', applyImageFilters);

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    previewImg.src = reader.result;
                    previewImg.style.display = 'block';
                    document.getElementById('uploadText').style.display = 'none';
                    document.getElementById('imageControls').style.display = 'flex';
                    
                    brightSlider.value = 100;
                    contrastSlider.value = 100;
                    applyImageFilters();

                    document.getElementById('resultContainer').style.display = 'none';
                    document.getElementById('statusContainer').style.display = 'flex';
                    document.getElementById('statusText').innerText = "Citra dimuat. Siap dianalisis.";
                    document.getElementById('btnPrint').style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function resetForm() {
            document.getElementById('fileInput').value = '';
            previewImg.src = '#';
            previewImg.style.display = 'none';
            document.getElementById('uploadText').style.display = 'block';
            document.getElementById('imageControls').style.display = 'none';
            
            document.getElementById('patientName').value = '';
            document.getElementById('patientId').value = '';
            document.getElementById('patientAge').value = '';
            document.getElementById('clinicalNotes').value = '';
            
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('statusContainer').style.display = 'flex';
            document.getElementById('statusText').innerText = "Menunggu data citra untuk diproses...";
            document.getElementById('btnPrint').style.display = 'none';
        }

        function processAnalysis() {
            const fileInput = document.getElementById('fileInput');
            
            if (!fileInput.files[0]) {
                alert("Mohon unggah citra MRI untuk memulai diagnosis.");
                return;
            }

            const btn = document.getElementById('btnAnalyze');
            btn.disabled = true;
            btn.innerText = "Memproses VGG-16...";
            
            document.getElementById('statusContainer').style.display = 'flex';
            document.getElementById('statusText').innerText = "Mengekstrak fitur radiologi...";
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('btnPrint').style.display = 'none';

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            fetch("/predict", {
                method: "POST",
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "Analisis Citra MRI";
                document.getElementById('statusContainer').style.display = 'none';
                document.getElementById('resultContainer').style.display = 'block';
                document.getElementById('btnPrint').style.display = 'block';
                
                if (data.error) {
                    document.getElementById("predictionText").innerText = "Gagal Dianalisis";
                    document.getElementById("predictionText").style.color = "#dc2626";
                } else {
                    document.getElementById("predictionText").innerText = data.prediction;
                    
                    let isNormal = data.prediction.includes("Tidak Ada") || data.prediction.includes("Normal");
                    let colorTheme = isNormal ? "#10b981" : "#dc2626"; 
                    
                    document.getElementById("predictionText").style.color = colorTheme;
                    document.getElementById("confidencePercentage").innerText = data.confidence;
                    
                    setTimeout(() => {
                        const confBar = document.getElementById("confBar");
                        confBar.style.width = data.confidence;
                        confBar.style.background = colorTheme;
                    }, 100);
                }
            })
            .catch(error => {
                btn.disabled = false;
                btn.innerText = "Analisis Citra MRI";
                document.getElementById('statusText').innerText = "Error: Tidak terhubung ke server.";
            });
        }

        // Fungsi baru untuk mengekspor data dan gambar menjadi PDF
        function downloadPDF() {
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) {
                alert("Data gambar tidak ditemukan.");
                return;
            }

            const btnPrint = document.getElementById('btnPrint');
            const originalText = btnPrint.innerText;
            btnPrint.innerText = "Menyiapkan PDF...";
            btnPrint.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("patientName", document.getElementById('patientName').value);
            formData.append("patientId", document.getElementById('patientId').value);
            formData.append("patientAge", document.getElementById('patientAge').value);
            formData.append("prediction", document.getElementById("predictionText").innerText);
            formData.append("confidence", document.getElementById("confidencePercentage").innerText);
            formData.append("notes", document.getElementById("clinicalNotes").value);

            fetch("/export_pdf", {
                method: "POST",
                body: formData
            })
            .then(response => {
                if (!response.ok) throw new Error("Gagal generate PDF");
                return response.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = "Laporan_MRI.pdf";
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                a.remove();
                
                btnPrint.innerText = originalText;
                btnPrint.disabled = false;
            })
            .catch(error => {
                alert("Terjadi kesalahan saat mengunduh PDF.");
                btnPrint.innerText = originalText;
                btnPrint.disabled = false;
            });
        }
    </script>
</body>
</html>
